<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - BridalVision</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #D4AF37;
            --gold-light: #E8D4A0;
            --white: #FFFFFF;
            --black: #1a1a1a;
            --gray: #f8f8f8;
        }
        body {
            font-family: 'Lexend', sans-serif;
            color: var(--black);
            line-height: 1.6;
            background: var(--white);
        }
        h1, h2 { font-family: 'Georgia', serif; font-weight: 400; letter-spacing: 2px; }
        .container { max-width: 600px; margin: 0 auto; padding: 0 40px; }
        .contact-page {
            min-height: 100vh;
            padding: 60px 40px 80px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 40px;
            color: var(--gold);
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 16px;
        }
        .back-link:hover { color: var(--gold-light); }
        .contact-page h1 {
            font-size: 42px;
            margin-bottom: 12px;
            color: var(--black);
        }
        .contact-page .subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 40px;
        }
        .contact-form label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--black);
        }
        .contact-form input,
        .contact-form select,
        .contact-form textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: inherit;
            font-size: 16px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .contact-form select { margin-bottom: 20px; cursor: pointer; }
        .contact-form input:focus,
        .contact-form select:focus,
        .contact-form textarea:focus {
            outline: none;
            border-color: var(--gold);
        }
        .phone-row { display: grid; grid-template-columns: 120px 1fr; gap: 16px; }
        @media (max-width: 480px) { .phone-row { grid-template-columns: 1fr; } }
        .contact-form textarea { min-height: 160px; resize: vertical; }
        .contact-form .error { color: #c00; font-size: 14px; margin-top: -14px; margin-bottom: 12px; }
        .contact-form .field-error { border-color: #c00; }
        .submit-btn {
            display: inline-block;
            padding: 18px 50px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            color: var(--black);
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4);
        }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        #success-message {
            display: none;
            padding: 24px;
            background: #e8f5e9;
            border: 1px solid #4caf50;
            border-radius: 12px;
            color: #2e7d32;
            font-weight: 500;
            margin-bottom: 24px;
        }
        #success-message.show { display: block; }
        .contact-form-wrapper.hide-form .contact-form { display: none; }
        .contact-form-wrapper.hide-form .form-subtitle { display: none; }
        footer {
            background: var(--black);
            color: var(--white);
            padding: 30px 40px;
            text-align: center;
            margin-top: 60px;
        }
        .footer-links { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
        .footer-links a { color: var(--gold); text-decoration: none; font-size: 14px; }
        .footer-links a:hover { color: var(--gold-light); }
        .footer-bottom { font-size: 14px; color: #999; }
    </style>
</head>
<body>
    <div class="contact-page">
        <div class="container">
            <a href="/" class="back-link">← Back to Home</a>
            <h1>Contact Us</h1>
            <div class="contact-form-wrapper" id="contact-form-wrapper">
            <p class="subtitle form-subtitle">We're here to help. Send us a message and we'll get back to you soon.</p>
            <div id="success-message">Thank you! Your message has been sent successfully. We'll get back to you shortly.</div>
            <form id="contact-form" class="contact-form" data-api-base="">
                <label for="name">Boutique/Shop name *</label>
                <input type="text" id="name" name="name" required autocomplete="name" placeholder="e.g. Rose & Co. Boutique">
                <div id="name-error" class="error" aria-live="polite"></div>
            
                <label for="email">Email *</label>
                <input type="text" id="email" name="email" required autocomplete="email" inputmode="email" placeholder="e.g. hello@yourboutique.com">
                <div id="email-error" class="error" aria-live="polite"></div>
            
                <label>Contact Number *</label>
                <div class="phone-row">
                    <div>
                        <input type="text" id="phoneCountryCode" name="phoneCountryCode" placeholder="+1" maxlength="5" autocomplete="tel-country-code">
                        <div id="phoneCountryCode-error" class="error" aria-live="polite"></div>
                    </div>
                    <div>
                        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="e.g. 555 123 4567" autocomplete="tel-national">
                        <div id="phoneNumber-error" class="error" aria-live="polite"></div>
                    </div>
                </div>
            
                <label for="subscriptionType">Which subscription plan are you interested in? *</label>
                <select id="subscriptionType" name="subscriptionType" required>
                    <option value="">Select a plan…</option>
                    <option value="monthly">Monthly</option>
                    <option value="quarterly">Quarterly</option>
                    <option value="annual">Annually</option>
                </select>
                <div id="subscriptionType-error" class="error" aria-live="polite"></div>
            
                <label for="message">Message *</label>
                <textarea id="message" name="message" required placeholder="Please tell us more about your purpose of using BridalVision"></textarea>
                <div id="message-error" class="error" aria-live="polite"></div>
            
                <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>
            </form>
            </div>
        </div>
    </div>
    <footer>
        <div class="container">
            <div class="footer-links">
                <a href="/">Home</a>
                <a href="/privacy">Privacy Policy</a>
                <a href="/terms">Terms & Conditions</a>
            </div>
            <div class="footer-bottom">&copy; 2025 BridalVision LLC. All rights reserved.</div>
        </div>
    </footer>
    <script>
        (function () {
            var form = document.getElementById('contact-form');
            var successEl = document.getElementById('success-message');
            var submitBtn = document.getElementById('submit-btn');
            var nameInput = document.getElementById('name');
            var emailInput = document.getElementById('email');
            var messageInput = document.getElementById('message');
            var phoneCountryCodeInput = document.getElementById('phoneCountryCode');
            var phoneNumberInput = document.getElementById('phoneNumber');
            var subscriptionTypeInput = document.getElementById('subscriptionType');
            var nameError = document.getElementById('name-error');
            var emailError = document.getElementById('email-error');
            var messageError = document.getElementById('message-error');
            var phoneCountryCodeError = document.getElementById('phoneCountryCode-error');
            var phoneNumberError = document.getElementById('phoneNumber-error');
            var subscriptionTypeError = document.getElementById('subscriptionType-error');

            function getApiBase() {
                return "https://plexiform-armor-474519-f7.uc.r.appspot.com"
                // if (typeof window.CONTACT_API_BASE === 'string' && window.CONTACT_API_BASE) return window.CONTACT_API_BASE;
                // var base = (form.getAttribute('data-api-base') || '').trim();
                // return base || '';
            }

            function clearErrors() {
                nameError.textContent = '';
                emailError.textContent = '';
                messageError.textContent = '';
                phoneCountryCodeError.textContent = '';
                phoneNumberError.textContent = '';
                subscriptionTypeError.textContent = '';
                nameInput.classList.remove('field-error');
                emailInput.classList.remove('field-error');
                messageInput.classList.remove('field-error');
                phoneCountryCodeInput.classList.remove('field-error');
                phoneNumberInput.classList.remove('field-error');
                subscriptionTypeInput.classList.remove('field-error');
            }

            function setError(field, msg) {
                if (field === 'name') { nameError.textContent = msg; nameInput.classList.add('field-error'); }
                if (field === 'email') { emailError.textContent = msg; emailInput.classList.add('field-error'); }
                if (field === 'message') { messageError.textContent = msg; messageInput.classList.add('field-error'); }
                if (field === 'phoneCountryCode') { phoneCountryCodeError.textContent = msg; phoneCountryCodeInput.classList.add('field-error'); }
                if (field === 'phoneNumber') { phoneNumberError.textContent = msg; phoneNumberInput.classList.add('field-error'); }
                if (field === 'subscriptionType') { subscriptionTypeError.textContent = msg; subscriptionTypeInput.classList.add('field-error'); }
            }

            var countryCodeRegex = /^\+[1-9]\d{0,3}$/;
            var phoneNumberRegex = /^\d{6,15}$/;
            var subscriptionTypes = ['monthly', 'quarterly', 'annual'];

            function validate() {
                clearErrors();
                var valid = true;
                var name = (nameInput.value || '').trim();
                var email = (emailInput.value || '').trim();
                var message = (messageInput.value || '').trim();
                var cc = (phoneCountryCodeInput.value || '').trim().replace(/\s/g, '');
                var pn = (phoneNumberInput.value || '').trim().replace(/\s/g, '');
                var sub = (subscriptionTypeInput.value || '').trim();
                if (!name) { setError('name', 'Name is required'); valid = false; }
                if (!email) { setError('email', 'Email is required'); valid = false; }
                else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setError('email', 'Please enter a valid email'); valid = false; }
                if (!cc) { setError('phoneCountryCode', 'Country code is required'); valid = false; }
                else if (!countryCodeRegex.test(cc)) { setError('phoneCountryCode', 'Use format +1, +91, etc.'); valid = false; }
                if (!pn) { setError('phoneNumber', 'Phone number is required'); valid = false; }
                else if (!phoneNumberRegex.test(pn)) { setError('phoneNumber', '6–15 digits only'); valid = false; }
                if (!sub) { setError('subscriptionType', 'Please select a plan'); valid = false; }
                else if (subscriptionTypes.indexOf(sub) === -1) { setError('subscriptionType', 'Please select a valid plan'); valid = false; }
                if (!message) { setError('message', 'Message is required'); valid = false; }
                return valid;
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                successEl.classList.remove('show');
                if (!validate()) return;
                var base = getApiBase();
                if (!base) {
                    messageError.textContent = 'API URL not configured. Set data-api-base on the form or window.CONTACT_API_BASE.';
                    return;
                }
                var url = base.replace(/\/$/, '') + '/api/contact-us';
                submitBtn.disabled = true;
                fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: nameInput.value.trim(),
                        email: emailInput.value.trim(),
                        message: messageInput.value.trim(),
                        phoneCountryCode: (phoneCountryCodeInput.value || '').trim().replace(/\s/g, ''),
                        phoneNumber: (phoneNumberInput.value || '').trim().replace(/\s/g, ''),
                        subscriptionType: (subscriptionTypeInput.value || '').trim()
                    })
                })
                    .then(function (res) { return res.json().then(function (data) { return { ok: res.ok, data: data }; }); })
                    .then(function (result) {
                        if (result.ok && result.data.success) {
                            document.getElementById('contact-form-wrapper').classList.add('hide-form');
                            successEl.classList.add('show');
                            form.reset();
                            clearErrors();
                            successEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        } else {
                            messageError.textContent = (result.data && result.data.message) || 'Something went wrong. Please try again.';
                            messageInput.classList.add('field-error');
                        }
                    })
                    .catch(function () {
                        messageError.textContent = 'Unable to send. Check your connection and that the API URL is correct.';
                        messageInput.classList.add('field-error');
                    })
                    .finally(function () { submitBtn.disabled = false; });
            });
        })();
    </script>
</body>
</html>
